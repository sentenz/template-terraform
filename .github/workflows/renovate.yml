# SPDX-License-Identifier: Apache-2.0

name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 6"

jobs:
  renovate:
    name: Renovate Action
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Renovate
        uses: sentenz/actions/renovate@ec5ca4ca09c4a45e5583cb88dd361381c1a62f62 # 1.1.6
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
