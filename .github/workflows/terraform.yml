# SPDX-License-Identifier: Apache-2.0

name: Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tftest.hcl"
      - ".github/workflows/terraform.yml"
      - ".tflint.hcl"
      - "GNUmakefile"
      - "Makefile"
      - "docs/terraform-operations.md"
      - "scripts/terraform-command.sh"
      - "tests/repository/terraform-command-guard.sh"
      - "trivy.yaml"
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tftest.hcl"
      - ".github/workflows/terraform.yml"
      - ".tflint.hcl"
      - "GNUmakefile"
      - "Makefile"
      - "docs/terraform-operations.md"
      - "scripts/terraform-command.sh"
      - "tests/repository/terraform-command-guard.sh"
      - "trivy.yaml"

permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.5

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Validate Terraform command guard
        run: bash tests/repository/terraform-command-guard.sh

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@ae78205cfffec9e8d93fd2b3115c7e9d3166d4b6 # v5.0.0

      - name: Initialize TFLint plugins
        run: tflint --init

      - name: Run TFLint
        id: tflint
        continue-on-error: true
        run: tflint --recursive --format compact > tflint-report.txt 2>&1

      - name: Upload TFLint report
        if: steps.tflint.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tflint-report
          path: tflint-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce TFLint
        if: steps.tflint.outcome == 'failure'
        run: |
          cat tflint-report.txt
          exit 1

  validate:
    name: Validate ${{ matrix.stack }}
    runs-on: ubuntu-latest
    needs: static-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: environments/stage/ec2
            report: stage-ec2
          - stack: environments/prod/ec2
            report: prod-ec2
          - stack: environments/stage/eks
            report: stage-eks
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.5

      - name: Terraform init without backend
        run: terraform -chdir=${{ matrix.stack }} init -backend=false

      - name: Terraform validate
        id: validate
        continue-on-error: true
        run: terraform -chdir=${{ matrix.stack }} validate -json > terraform-validate-report.json

      - name: Upload Terraform validate report
        if: steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-validate-${{ matrix.report }}
          path: terraform-validate-report.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Terraform validate
        if: steps.validate.outcome == 'failure'
        run: |
          cat terraform-validate-report.json
          exit 1

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy IaC scan
        uses: sentenz/actions/trivy@de1f3edb8a4562d89b6f8d48e93ce64caa653230 # 1.1.5
        with:
          scan-type: config
          scan-target: .
          format: sarif
          output: trivy-terraform.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-terraform.sarif
