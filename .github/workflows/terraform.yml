name: Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tftest.hcl"
      - "**/.terraform.lock.hcl"
      - "Makefile"
      - "scripts/check_terraform_safety.py"
      - "scripts/**/*.sh"
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - ".tflint.hcl"
      - "trivy.yaml"
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tftest.hcl"
      - "**/.terraform.lock.hcl"
      - "Makefile"
      - "scripts/check_terraform_safety.py"
      - "scripts/**/*.sh"
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - ".tflint.hcl"
      - "trivy.yaml"

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.5

      - name: Terraform format check
        run: terraform fmt -check -diff -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@ae78205cfffec9e8d93fd2b3115c7e9d3166d4b6 # v5.0.0

      - name: Initialize TFLint plugins
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --minimum-failure-severity=error

      - name: Verify Terraform task-runner safety
        run: python scripts/check_terraform_safety.py

  validate:
    name: Validate ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stage-ec2
            stack: environments/stage/ec2
          - name: prod-ec2
            stack: environments/prod/ec2
          - name: stage-eks
            stack: environments/stage/eks
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform init without backend
        id: init
        continue-on-error: true
        run: terraform -chdir=${{ matrix.stack }} init -backend=false -no-color 2>&1 | tee terraform-init-${{ matrix.name }}.log

      - name: Verify dependency lock file
        id: lockfile
        if: steps.init.outcome == 'success'
        continue-on-error: true
        run: git diff --exit-code -- ${{ matrix.stack }}/.terraform.lock.hcl > terraform-lockfile-${{ matrix.name }}.diff

      - name: Collect dependency lock file
        if: always() && steps.init.outcome == 'success'
        run: cp ${{ matrix.stack }}/.terraform.lock.hcl terraform-lockfile-${{ matrix.name }}.hcl

      - name: Terraform validate
        id: validate
        if: steps.init.outcome == 'success'
        continue-on-error: true
        run: terraform -chdir=${{ matrix.stack }} validate -json > terraform-validate-${{ matrix.name }}.json

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-validation-${{ matrix.name }}
          path: |
            terraform-init-${{ matrix.name }}.log
            terraform-lockfile-${{ matrix.name }}.diff
            terraform-lockfile-${{ matrix.name }}.hcl
            terraform-validate-${{ matrix.name }}.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce validation result
        if: steps.init.outcome == 'failure' || steps.lockfile.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: exit 1

  test:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aws-ec2
            module: modules/aws-ec2
          - name: aws-eks
            module: modules/aws-eks
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform init without backend
        id: init
        continue-on-error: true
        run: terraform -chdir=${{ matrix.module }} init -backend=false -no-color 2>&1 | tee terraform-test-init-${{ matrix.name }}.log

      - name: Terraform native tests
        id: test
        if: steps.init.outcome == 'success'
        continue-on-error: true
        run: terraform -chdir=${{ matrix.module }} test -no-color 2>&1 | tee terraform-test-${{ matrix.name }}.log

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-test-${{ matrix.name }}
          path: |
            terraform-test-init-${{ matrix.name }}.log
            terraform-test-${{ matrix.name }}.log
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce test result
        if: steps.init.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkov Terraform scan
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # Checkov 3.3.8
        with:
          directory: .
          framework: terraform
          compact: true
          quiet: true
          skip_results_upload: true
          skip_download: true
          download_external_modules: false
          output_format: cli,json
          output_file_path: console,checkov-report.json

      - name: Upload Checkov evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checkov-terraform-report
          path: checkov-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Trivy IaC scan
        if: always()
        uses: sentenz/actions/trivy@de1f3edb8a4562d89b6f8d48e93ce64caa653230 # 1.1.5
        with:
          scan-type: config
          scan-target: .
          format: sarif
          output: trivy-terraform.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-terraform.sarif

      - name: Enforce Checkov result
        if: steps.checkov.outcome == 'failure'
        run: exit 1
