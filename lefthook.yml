pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: make sast-gitleaks-staged
      skip:
        - run: "! which docker"
    semgrep:
      run: make sast-semgrep-scan SAST_FILES_SEMGREP="{staged_files}"
      skip:
        - run: "! which docker"
    trivy:
      run: make sast-trivy-misconfig SAST_FILES_TRIVY="{staged_files}"
      skip:
        - run: "! which docker"
    markdownlint:
      glob: "**/*.md"
      run: make lint-markdown LINT_FILES_MARKDOWNLINT="{staged_files}"
      skip:
        - run: "! which docker"
